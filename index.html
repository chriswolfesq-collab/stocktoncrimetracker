<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stockton Crime Tracker V3</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">SCT</div>
      <div>
        <h1>Stockton Crime Tracker</h1>
        <p>Calls for Service Dashboard</p>
      </div>
    </div>

    <section class="panel">
      <label>Date Range</label>
      <select id="datePreset">
        <option value="24h" selected>Last 24 Hours</option>
        <option value="today">Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="7d">Last 7 Days</option>
        <option value="30d">Last 30 Days</option>
        <option value="month">This Month</option>
        <option value="custom">Custom Range</option>
      </select>

      <div id="customDates" class="custom-dates hidden">
        <label>From</label>
        <input id="fromDate" type="date" />
        <label>To</label>
        <input id="toDate" type="date" />
        <button id="applyCustom">Apply</button>
      </div>
    </section>

    <section class="panel">
      <label>Incident Category</label>
      <select id="categoryFilter">
        <option value="ALL">All Categories</option>
        <option value="VIOLENT">Violent / Weapons</option>
        <option value="PROPERTY">Property Crime</option>
        <option value="TRAFFIC">Traffic</option>
        <option value="MEDICAL">Medical / Welfare</option>
        <option value="SUSPICIOUS">Suspicious Activity</option>
        <option value="OTHER">Other</option>
      </select>

      <label>Call Type</label>
      <select id="typeFilter">
        <option value="ALL">All Call Types</option>
      </select>

      <label>District</label>
      <select id="districtFilter">
        <option value="ALL">All Districts</option>
      </select>
    </section>

    <section class="panel">
      <div class="stats-grid">
        <div class="stat"><span id="totalCalls">0</span><small>Calls</small></div>
        <div class="stat red"><span id="p1Calls">0</span><small>Priority 1</small></div>
        <div class="stat orange"><span id="p2Calls">0</span><small>Priority 2</small></div>
        <div class="stat blue"><span id="p3Calls">0</span><small>Priority 3+</small></div>
      </div>
    </section>

    <section class="panel">
      <div class="row">
        <button id="reloadBtn">Reload</button>
        <button id="fitBtn">Fit Map</button>
      </div>
      <label class="check">
        <input id="autoRefresh" type="checkbox" />
        Auto-refresh every 60 seconds
      </label>
      <div id="status">Ready</div>
    </section>

    <section class="panel note">
      Uses Stockton's public Calls for Service feed. Locations are cross-street/generalized public data.
    </section>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <strong id="showingLabel">Showing: Last 24 Hours</strong>
        <span id="countLabel">0 incidents</span>
      </div>
      <input id="searchBox" placeholder="Search call type, street, district..." />
    </div>
    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>
