<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Incident Importer</title>
<style>
body{font-family:Arial,sans-serif;background:#111827;color:#fff;max-width:1000px;margin:30px auto;padding:20px}
textarea,input,select{width:100%;padding:10px;margin:6px 0 14px;background:#1f2937;color:#fff;border:1px solid #374151;border-radius:8px}
button{padding:12px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer}
.card{background:#1f2937;padding:16px;border-radius:10px;margin-top:20px}
pre{white-space:pre-wrap;background:#0f172a;padding:10px;border-radius:8px}
</style>
</head>
<body>
<h1>Incident Importer</h1>
<p>Paste a news article URL and/or article text. This tool creates a JSON incident ready to be added to <b>incidents.json</b>.</p>

<label>Source URL</label>
<input id="url" placeholder="https://...">

<label>Article Title</label>
<input id="title">

<label>Article Text</label>
<textarea id="text" rows="12"></textarea>

<button onclick="build()">Generate Incident JSON</button>

<div class="card">
<h2>Preview</h2>
<pre id="out"></pre>
<button onclick="download()">Download incident.json</button>
</div>

<script>
let incident=null;

function category(t){
 t=t.toLowerCase();
 if(/homicide|murder/.test(t)) return "HOMICIDE";
 if(/shoot|gun|shots fired/.test(t)) return "SHOOTING";
 if(/robbery|carjack/.test(t)) return "ROBBERY";
 if(/burglary|break.?in/.test(t)) return "BURGLARY";
 if(/pursuit|chase/.test(t)) return "PURSUIT";
 if(/crash|collision|dui/.test(t)) return "TRAFFIC";
 if(/fire|arson/.test(t)) return "FIRE";
 return "OTHER";
}

function location(txt){
 const roads=["Hammer","March","Pacific","West","Wilson","Airport","Pershing","Waterloo","Benjamin Holt"];
 for(const r of roads){
   const re=new RegExp(r+".{0,20}(Lane|Ln|Road|Rd|Street|St|Avenue|Ave|Way|Drive|Dr)","i");
   const m=txt.match(re);
   if(m) return m[0];
 }
 return "Stockton, CA";
}

function build(){
 const title=document.getElementById("title").value.trim();
 const text=document.getElementById("text").value.trim();
 const url=document.getElementById("url").value.trim();
 incident={
   id:Date.now(),
   title,
   category:category(title+" "+text),
   date:new Date().toISOString(),
   location:location(title+" "+text),
   summary:text.substring(0,400),
   source:url,
   status:"Reported",
   articles:[{title:title,url:url}]
 };
 document.getElementById("out").textContent=JSON.stringify(incident,null,2);
}

function download(){
 if(!incident){alert("Generate an incident first.");return;}
 const blob=new Blob([JSON.stringify([incident],null,2)],{type:"application/json"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="incident.json";
 a.click();
 URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
